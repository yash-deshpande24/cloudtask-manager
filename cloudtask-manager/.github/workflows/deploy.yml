name: CI/CD — Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION:    us-east-1
  ECR_REGISTRY:  ${{ secrets.ECR_REGISTRY }}

jobs:
  # ── 1. TEST ───────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Backend Tests
        working-directory: backend
        run: npm ci && npm test

      - name: Frontend Tests
        working-directory: frontend
        run: npm ci && npm test

  # ── 2. BUILD & PUSH to ECR ────────────────────────────
  build:
    name: Build & Push Docker Images
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Backend
        run: |
          docker build -t $ECR_REGISTRY/cloudtask-backend:latest ./backend
          docker build -t $ECR_REGISTRY/cloudtask-backend:${{ github.sha }} ./backend
          docker push $ECR_REGISTRY/cloudtask-backend:latest
          docker push $ECR_REGISTRY/cloudtask-backend:${{ github.sha }}

      - name: Build & Push Frontend
        run: |
          docker build -t $ECR_REGISTRY/cloudtask-frontend:latest ./frontend
          docker push $ECR_REGISTRY/cloudtask-frontend:latest

  # ── 3. DEPLOY to EC2 ─────────────────────────────────
  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ubuntu
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/cloudtask-manager
            git pull origin main
            aws ecr get-login-password --region us-east-1 | \
              docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
            docker-compose pull
            docker-compose up -d --remove-orphans
            docker image prune -f
            echo "Deployed at $(date)"

  # ── 4. NOTIFY (CloudWatch / SNS done via Terraform) ──
